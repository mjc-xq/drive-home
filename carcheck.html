<!doctype html>
<html><head><meta charset="utf8"><title>car orientation — confirm</title>
<style>
  body{background:#15171c;color:#e8e8e8;font-family:ui-monospace,monospace;margin:0;padding:10px}
  h2{font-size:13px;margin:0 0 8px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .cell{background:#23262d;border:1px solid #3a3f48;border-radius:7px;padding:5px}
  .cell.ref{border-color:#2BE84F}
  .cell img{width:100%;display:block;border-radius:4px;background:#0e1014}
  .name{font-size:12px;font-weight:700;padding:3px 2px;color:#cfe}
  .fail{color:#ff7b7b}
</style>
<script type="importmap">{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
}}</script>
</head><body>
<h2>GAME-ACCURATE chase view. CORRECT = REAR toward camera, driving away toward the green arrow — like the green REF. Confirm each.</h2>
<div class="grid" id="grid"></div>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
const CARYAW=-Math.PI/2, P=Math.PI;
// [label, file, length, spin, isRef]
const CARS=[
  ['REF RAV4 flip:true','rav4',4.6,CARYAW+P,true],
  ['Murcielago flip:true','murcielago',4.7,CARYAW+P,false],
  ['Caspita flip:true','caspita',4.6,CARYAW+P,false],
  ["'65 Mustang flip:true",'mustang65',4.8,CARYAW+P,false],
  ["'65 Mini flip:true",'mini65',3.4,CARYAW+P,false],
  ['Rat Rod flip:true','ratrod',4.6,CARYAW+P,false],
  ['Hot Rod +90','hotrod',4.5,CARYAW+P/2,false],
  ['Hot Rod -90','hotrod',4.5,CARYAW-P/2,false],
  ['Hot Rod flip:true (sideways?)','hotrod',4.5,CARYAW+P,false],
];
const url=n=>'/src/assets/'+n+'.glb';
const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(360,250); renderer.setPixelRatio(1.5); renderer.setClearColor(0x0e1014);
const scene=new THREE.Scene();
scene.add(new THREE.HemisphereLight(0xffffff,0x404048,2.6));
const dl=new THREE.DirectionalLight(0xffffff,2.4); dl.position.set(4,9,6); scene.add(dl);
const dl2=new THREE.DirectionalLight(0xbcd,1.2); dl2.position.set(-5,4,-4); scene.add(dl2);
scene.add(new THREE.ArrowHelper(new THREE.Vector3(0,0,1),new THREE.Vector3(0,0.25,3.2),3,0x2BE84F,0.9,0.6));
scene.add(new THREE.GridHelper(24,24,0x556,0x2a2e35));
const cam=new THREE.PerspectiveCamera(34,360/250,0.1,100); cam.position.set(4.5,3.4,-9.5); cam.lookAt(0,0.7,0);
const draco=new DRACOLoader().setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/libs/draco/');
const ktx2=new KTX2Loader().setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/libs/basis/').detectSupport(renderer);
const loader=new GLTFLoader(); loader.setDRACOLoader(draco); loader.setKTX2Loader(ktx2);
const STUDIO=/floor|ceiling|curtain|backdrop|background|\bwall\b|studio|showroom|shadow|ground|\barc(black|metall|logo|matte)/i;
function normalize(s,length){
  const junk=[]; s.traverse(o=>{ if(o.isMesh&&STUDIO.test((o.name||'')+' '+((o.material&&o.material.name)||''))) junk.push(o); });
  for(const o of junk){ if(o.parent) o.parent.remove(o); }
  s.updateMatrixWorld(true);
  const box=new THREE.Box3().setFromObject(s),size=new THREE.Vector3(); box.getSize(size);
  const k=length/(Math.max(size.x,size.z)||1);
  s.scale.setScalar(k); s.position.set(-(box.min.x+box.max.x)/2*k,-box.min.y*k,-(box.min.z+box.max.z)/2*k);
  return s;
}
let cur=null;
const gridEl=document.getElementById('grid');
for(const [label,file,length,spin,ref] of CARS){
  const c=document.createElement('div'); c.className='cell'+(ref?' ref':''); const cap=document.createElement('div'); cap.className='name'; cap.textContent=label; const img=document.createElement('img'); c.appendChild(cap); c.appendChild(img); gridEl.appendChild(c);
  try{
    const g=await loader.loadAsync(url(file));
    const m=normalize(g.scene,length);
    m.traverse(o=>{ if(o.isMesh) o.material=new THREE.MeshStandardMaterial({color:0xb9bdc4,metalness:0.15,roughness:0.6}); });
    if(cur) scene.remove(cur);
    const carGroup=new THREE.Group(); carGroup.rotateY(-Math.PI/2);
    const inner=new THREE.Group(); inner.rotation.y=spin; inner.add(m); carGroup.add(inner); scene.add(carGroup); cur=carGroup;
    renderer.render(scene,cam); img.src=renderer.domElement.toDataURL('image/png');
  }catch(e){ cap.className='name fail'; cap.textContent=label+' FAIL '+e.message; }
}
window.__carcheckDone=true;
</script>
</body></html>
